name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff mypy -r requirements-dev.txt
      - run: ruff check mailcode/ tests/
      - run: python3 -m pytest tests/unit/ -q
      - run: mypy mailcode/ --ignore-missing-imports || true
